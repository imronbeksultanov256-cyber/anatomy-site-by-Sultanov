// STATE MANAGEMENT
let activeSection = 'all';
let currentQuestionIdx = 0;
let learnedQuestions = new Set();
let filteredQuestions = [...QUESTIONS];

// INITIALIZATION
window.addEventListener('DOMContentLoaded', () => {
  loadProgress();
  renderGrid();
  updateProgressUI();
});

// RENDER FUNCTION
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  filteredQuestions.forEach((q) => {
    const isLearned = learnedQuestions.has(q.n);
    const secColor = SECTIONS[q.sec].accent;

    const card = document.createElement('div');
    card.className = `q-card ${isLearned ? 'answered' : ''}`;
    card.style.setProperty('--card-accent', secColor);
    card.setAttribute('data-id', q.n);
    card.onclick = () => openQuestion(q.n);

    const tagsHtml = q.tags.map(t => `<span class="tag">${t}</span>`).join('');

    card.innerHTML = `
      <div>
        <div class="card-num">Вопрос ${q.n} · Раздел ${q.sec}</div>
        <div class="card-title">${q.title}</div>
      </div>
      <div class="card-tags">
        ${tagsHtml}
      </div>
    `;
    grid.appendChild(card);
  });
}

// FILTER SECTIONS
function filterSection(sec, btn) {
  activeSection = sec;
  
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  applyFilters();
}

// INTERACTIVE SEARCH
function handleSearch() {
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  
  filteredQuestions = QUESTIONS.filter(q => {
    const matchesSection = (activeSection === 'all' || q.sec.toString() === activeSection);
    const matchesSearch = !query || 
      q.title.toLowerCase().includes(query) || 
      q.tags.some(t => t.toLowerCase().includes(query));
    
    return matchesSection && matchesSearch;
  });

  renderGrid();
}

// MODAL LOGIC
function openQuestion(qNum) {
  const qIdx = QUESTIONS.findIndex(q => q.n === qNum);
  if (qIdx === -1) return;

  currentQuestionIdx = qIdx;
  const q = QUESTIONS[qIdx];
  const secColor = SECTIONS[q.sec].accent;

  const modal = document.getElementById('modal');
  modal.style.setProperty('--modal-accent', secColor);

  document.getElementById('modalNum').innerText = `Раздел ${q.sec} · Вопрос ${q.n} из 45`;
  document.getElementById('modalTitle').innerText = q.title;

  // Build body content
  let bodyHtml = `
    <div class="answer-section">
      <div class="definition-box">${q.answer.def}</div>
    </div>
  `;

  if (q.answer.blocks && q.answer.blocks.length > 0) {
    bodyHtml += `<div class="answer-section anatomy-grid">`;
    q.answer.blocks.forEach(b => {
      const listItems = b.items.map(item => `<li>${item}</li>`).join('');
      bodyHtml += `
        <div class="anatomy-card">
          <div class="anatomy-card-title">${b.title}</div>
          <ul>${listItems}</ul>
        </div>
      `;
    });
    bodyHtml += `</div>`;
  }

  if (q.answer.pills && q.answer.pills.length > 0) {
    bodyHtml += `
      <div class="answer-section">
        <div class="section-label">Ключевые ориентиры</div>
        <div class="highlight-row">
    `;
    q.answer.pills.forEach(p => {
      bodyHtml += `
        <div class="highlight-pill">
          <strong>${p.label}</strong>
          ${p.text}
        </div>
      `;
    });
    bodyHtml += `</div></div>`;
  }

  if (q.answer.tip) {
    bodyHtml += `
      <div class="answer-section">
        <div class="exam-tip">
          <div class="exam-tip-icon">💡</div>
          <div><strong>Совет для демонстрации на муляже:</strong> ${q.answer.tip}</div>
        </div>
      </div>
    `;
  }

  document.getElementById('modalBody').innerHTML = bodyHtml;
  updateLearnedButtonState(q.n);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateLearnedButtonState(qNum) {
  const btn = document.getElementById('learnedBtn');
  const icon = document.getElementById('learnedIcon');
  const text = document.getElementById('learnedText');

  if (learnedQuestions.has(qNum)) {
    btn.classList.add('done');
    icon.innerText = '✓';
    text.innerText = 'Изучено';
  } else {
    btn.classList.remove('done');
    icon.innerText = '✓';
    text.innerText = 'Изучил';
  }
}

function markLearned() {
  const q = QUESTIONS[currentQuestionIdx];
  if (learnedQuestions.has(q.n)) {
    learnedQuestions.delete(q.n);
  } else {
    learnedQuestions.add(q.n);
  }

  saveProgress();
  updateLearnedButtonState(q.n);
  updateProgressUI();
  
  // Re-render only target card state dynamically
  const card = document.querySelector(`.q-card[data-id="${q.n}"]`);
  if (card) {
    if (learnedQuestions.has(q.n)) card.classList.add('answered');
    else card.classList.remove('answered');
  }
}

function navQuestion(dir) {
  let newIdx = currentQuestionIdx + dir;
  if (newIdx < 0) newIdx = QUESTIONS.length - 1;
  if (newIdx >= QUESTIONS.length) newIdx = 0;
  
  openQuestion(QUESTIONS[newIdx].n);
}

function closeModal(e) {
  if (e.target.id === 'modalOverlay') {
    closeModalDirect();
  }
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// PROGRESS METRICS & STORAGE
function updateProgressUI() {
  const count = learnedQuestions.size;
  const pct = (count / QUESTIONS.length) * 100;
  
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressLabel').innerText = `${count} / ${QUESTIONS.length} изучено`;
}

function saveProgress() {
  localStorage.setItem('anatomy_learned_ids', JSON.stringify([...learnedQuestions]));
}

function loadProgress() {
  const data = localStorage.getItem('anatomy_learned_ids');
  if (data) {
    try {
      learnedQuestions = new Set(JSON.parse(data));
    } catch(e) {
      learnedQuestions = new Set();
    }
  }
}
</script>
</body>
</html>
